name: Scrape Facebook Ads

# Roda a cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC — Brasília: 21h, 03h, 09h, 15h).
# Também pode ser disparado manualmente pela aba Actions do GitHub.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APP_URL: https://mineracaofb.vercel.app
    steps:
      - name: Listar alvos ativos
        id: targets
        run: |
          set -euo pipefail
          RESPONSE=$(curl -fsS \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "$APP_URL/api/cron/targets")
          echo "$RESPONSE" | jq .
          IDS=$(echo "$RESPONSE" | jq -r '.ids | join(" ")')
          echo "ids=$IDS" >> "$GITHUB_OUTPUT"
          echo "Total: $(echo $IDS | wc -w) alvo(s)"

      - name: Scrapear cada alvo
        if: steps.targets.outputs.ids != ''
        run: |
          set -uo pipefail
          FAILED=0
          for id in ${{ steps.targets.outputs.ids }}; do
            echo "=== Scraping $id ==="
            if curl -fsS --max-time 90 \
                -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
                "$APP_URL/api/cron/scrape?id=$id"; then
              echo "  → ok"
            else
              echo "  → FALHOU"
              FAILED=$((FAILED+1))
            fi
            echo ""
          done
          echo "Total de falhas: $FAILED"
          # Não quebra o workflow se um alvo falhou — o próximo ciclo tenta de novo.
          exit 0
